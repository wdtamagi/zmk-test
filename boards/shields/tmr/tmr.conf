# This file was generated from a template. Edit it to match your keyboard.
# See https://zmk.dev/docs/development/hardware-integration/new-shield for more
# instructions.

# This file will be copied into the user's config directory when they add this
# keyboard. Define any Kconfig options users may frequently want to set here,
# but leave them commented out, for example:

# Uncomment to enable the encoder
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment to enable the display
# CONFIG_ZMK_DISPLAY=y
#
#

# bluetooth options
CONFIG_CLOCK_CONTROL_NRF_K32SRC_50PPM=y

# zmk stack sizes
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=2048
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=2048
CONFIG_INPUT_THREAD_STACK_SIZE=2048

# zephyr stack sizes
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=4096
CONFIG_BT_CTLR_RX_PRIO_STACK_SIZE=512
CONFIG_BT_L2CAP_TX_BUF_COUNT=12
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1024

# debugging options
CONFIG_DEBUG=y

CONFIG_HE_GAMEPAD_HID_SWAP_TRIGGER_R_AXIS=y
CONFIG_HE_GAMEPAD_HID_NUM_BUTTONS=12
