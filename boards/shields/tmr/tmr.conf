# Analog stick driver
CONFIG_ZMK_ANALOG_STICK=y
CONFIG_ZMK_ANALOG_STICK_STICK_COUNT=2
CONFIG_ZMK_POINTING=y

# Bluetooth options
CONFIG_CLOCK_CONTROL_NRF_K32SRC_50PPM=y

# ZMK stack sizes
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=2048
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=2048
CONFIG_INPUT_THREAD_STACK_SIZE=2048

# Zephyr stack sizes
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_ISR_STACK_SIZE=4096
CONFIG_BT_CTLR_RX_PRIO_STACK_SIZE=512
CONFIG_BT_L2CAP_TX_BUF_COUNT=12
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1024

# Debugging options
CONFIG_DEBUG=y
CONFIG_ZMK_USB_LOGGING=y

# Keep power on
CONFIG_ZMK_IDLE_TIMEOUT=0
CONFIG_ZMK_SLEEP=n
